<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta Digital + NFC · Claro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid"></div>
  </div>

  <main class="wrap">
    <section class="card" role="region" aria-label="Tarjeta digital Claro">

      <header class="top">
        <div class="claro-mark" aria-hidden="true">
          <img src="img/logo7.png" alt="Claro">
        </div>

        <div class="halo" aria-hidden="true"></div>

        <div class="logo">
          <img
            src="img/perfiles/default.png"
            alt="Foto de perfil"
            class="logo-img"
            id="profilePhoto"
          />
        </div>

        <h1 class="name" id="profileName">Cargando...</h1>
        <p class="role" id="profileRole">Asesor Comercial</p>

        <div class="dni-container" id="profileDniContainer">
          <div class="dni-badge">
            <small>DNI VERIFICADO</small>
            <span id="profileDni">--.---.---</span>
          </div>
        </div>

        <div class="mini-chips">
          <span class="chip">Personal ITEC</span>
          <span class="chip">Contacto Oficial</span>
        </div>
      </header>

      <div class="divider"></div>

      <section class="actions">
        <a class="btn glass" id="btnWhatsapp" href="#" target="_blank">
          <span class="icon">💬</span>
          <div class="txt">
            <strong>WhatsApp</strong>
            <span>Escribime al instante</span>
          </div>
          <span class="go">↗</span>
        </a>

        <a class="btn glass" id="btnEmail" href="#">
          <span class="icon">✉️</span>
          <div class="txt">
            <strong>Email Oficial</strong>
            <span>Enviar consulta</span>
          </div>
          <span class="go">↗</span>
        </a>
      </section>

      <footer class="foot">
        <p class="note">NFC Business Card · <strong>Claro Argentina</strong></p>
      </footer>

    </section>
  </main>

  <a class="avatar-float" id="floatBot" href="#" target="_blank">
    <div class="avatar-bubble">
      <img class="avatar-img" src="img/avatar.jpg" alt="WhatsApp">
    </div>
    <span class="avatar-tag">Chat Directo</span>
  </a>

  <script src="js/app.js"></script>
</body>
</html>
