<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta Digital + NFC · Claro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid"></div>
  </div>

  <main class="wrap">
    <section class="card" role="region" aria-label="Tarjeta digital Claro">

      <header class="top">
        <div class="claro-mark" aria-hidden="true">
          <img src="img/logo7.png" alt="Claro">
        </div>

        <div class="logo">
          <img
            src="img/perfiles/default.png"
            alt="Foto de perfil"
            class="logo-img"
            id="profilePhoto"
          />
        </div>

        <h1 class="name" id="profileName">Cargando...</h1>
        <p class="role" id="profileRole">Asesor Comercial</p>

        <div class="dni-container" id="profileDniContainer">
          <div class="dni-badge">
            <small>DNI VERIFICADO:</small>
            <span id="profileDni">--.---.---</span>
          </div>
        </div>
      </header>

      <div class="divider"></div>

      <section class="actions">
        <a class="btn glass" href="javascript:void(0)" onclick="openQR()">
          <span class="icon">🔳</span>
          <div class="txt">
            <strong>Mi Código QR</strong>
            <span>Compartir perfil</span>
          </div>
          <span class="go">↗</span>
        </a>

        <a class="btn glass pulse-wa" id="btnWhatsapp" href="#" target="_blank">
          <span class="icon">💬</span>
          <div class="txt">
            <strong>WhatsApp</strong>
            <span>Atención inmediata</span>
          </div>
          <span class="go">↗</span>
        </a>

        <a class="btn glass" id="btnEmail" href="#">
          <span class="icon">✉️</span>
          <div class="txt">
            <strong>Email Oficial</strong>
            <span>Enviar consulta</span>
          </div>
          <span class="go">↗</span>
        </a>
      </section>

      <div style="padding: 0 25px 25px;">
        <button class="btn-save" onclick="generateVCard()">
           👤 Guardar Contacto
        </button>
      </div>

    </section>
  </main>

  <div id="qrModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeQR()">&times;</span>
      <h3 style="color: #000; margin-bottom: 5px;">Mi QR Oficial</h3>
      <p style="color: #666; font-size: 12px;">Escaneame para guardar mis datos</p>
      <div id="qrcode"></div>
      <button class="btn-close-qr" onclick="closeQR()">Cerrar</button>
    </div>
  </div>

  <a class="avatar-float" id="floatBot" href="#" target="_blank">
    <div class="avatar-bubble">
      <img class="avatar-img" src="img/avatar.jpg" alt="WhatsApp">
    </div>
    <span class="avatar-tag">Chat Directo</span>
  </a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
